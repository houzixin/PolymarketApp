workflows:
  android-workflow:
    name: Polymarket Android APK
    max_build_duration: 30
    environment:
      groups:
        - default
      vars:
        PACKAGE_NAME: "com.polymarketapp"
      node: 18
      java: 17
      android_signing:
        - keystore_reference: android_keystore
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
          source: true
    scripts:
      - name: Install Node.js dependencies
        script: |
          npm install --legacy-peer-deps
      
      - name: Build Android APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
      
      - name: Copy APK
        script: |
          cp android/app/build/outputs/apk/debug/app-debug.apk $CM_BUILD_DIR/PolymarketApp-debug.apk
    artifacts:
      - PolymarketApp-debug.apk
    publishing:
      email:
        recipients:
          - user@example.com
        notify:
          success: true
          failure: true
