rootProject.name = 'PolymarketApp'
include ':app'

// 使用本地 node_modules 中的 React Native
def reactNativePath = new File(['node', '--print', "require.resolve('react-native/package.json')"].execute(null, rootDir).text.trim(), '../')
includeBuild(reactNativePath) {
    dependencySubstitution {
        substitute module('com.facebook.react:react-android') using project(':')
        substitute module('com.facebook.react:react-native') using project(':')
    }
}
